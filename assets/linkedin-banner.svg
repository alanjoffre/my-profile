    <circle cx="1500" cy="60" r="6" fill="#0d1117" stroke="#a78bfa" stroke-width="2"/>
    <circle cx="1440" cy="160" r="5" fill="#0d1117" stroke="#22d3ee" stroke-width="2"/>
