  <!-- links -->
  <text x="792" y="336" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#7f8ba3">github.com/alanjoffre&#160;&#160;&#183;&#160;&#160;huggingface.co/spaces/alanjoffre/rodoia-rag</text>

  <!-- baseline road motif -->
