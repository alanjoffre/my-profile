  <!-- stack line -->
  <text x="792" y="270" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#93a0b6">Lakehouse &#183; dbt &#183; Databricks &#183; PySpark &#183; Airflow&#8195;|&#8195;RAG &#183; fine-tuning &#183; vLLM &#183; LangGraph &#183; MLOps</text>

