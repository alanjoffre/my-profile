    </radialGradient>
    <radialGradient id="glowC" cx="0.85" cy="0.9" r="0.7">
      <stop offset="0" stop-color="#06b6d4" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glowV)"/>
  <rect width="1584" height="396" fill="url(#glowC)"/>

  <!-- faint node decoration (top corners, out of the avatar zone) -->
  <g opacity="0.5" fill="none" stroke="#33456b" stroke-width="1.4">
    <path d="M1360 70 L1430 96 L1500 60"/>
    <path d="M1430 96 L1440 160"/>
